{% extends "base.html" %}
{% block content %}
<h2>Recording Temple</h2>
<p class="brand-sub">Capture your voice, instruments or cosmic improvisations — save to local and optionally upload to the cloud.</p>

<section style="display:flex;gap:12px;">
  <div style="flex:1;background:var(--glass);padding:12px;border-radius:8px;">
    <label>Title</label>
    <input id="recTitle" type="text" placeholder="My Sacred Session" style="padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.05);width:100%">
    <div class="rec-controls" style="margin-top:12px">
      <button class="btn gold" id="startRecBtn">🎙 Start</button>
      <button class="btn" id="stopRecBtn">⏹ Stop</button>
      <button class="btn" id="downloadBtn">⬇ Download</button>
      <button class="btn" id="uploadBtn">📤 Upload</button>
    </div>
    <div id="recordLog" style="margin-top:12px;color:#bfb8b0">No recording yet.</div>
  </div>

  <div style="width:320px;background:var(--glass);padding:12px;border-radius:8px;">
    <h4 style="color:var(--gold)">Session Info</h4>
    <div id="sessionInfo">Sample rate, duration, saved files will display here.</div>
  </div>
</section>

<script>
  // wire to core recorder functions from static/js/recorder.js
  document.getElementById('startRecBtn').onclick = async ()=>{
    await window.rackEngine && startRec(window.rackEngine);
    document.getElementById('recordLog').innerText = 'Recording...';
  };
  document.getElementById('stopRecBtn').onclick = ()=>{ stopRec(); document.getElementById('recordLog').innerText = 'Recording stopped.'; };
  document.getElementById('downloadBtn').onclick = ()=>{ downloadLastRecording && downloadLastRecording(); };
  document.getElementById('uploadBtn').onclick = async ()=>{
    // if last blob exists inside recorder.js, the upload to /api/save-recording is handled there when recorder stops,
    alert('Upload will occur automatically when recording stops (if available).');
  };
</script>
{% endblock %}
