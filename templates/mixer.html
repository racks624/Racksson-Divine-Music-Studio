{% extends "base.html" %}
{% block head %}
<style>
  .mixer-container { display: flex; gap: 20px; overflow-x: auto; padding: 16px 0; }
  .channel { min-width: 130px; background: rgba(0,0,0,0.6); border-radius: 16px; padding: 12px; text-align: center; border: 1px solid #333; }
  .channel.active { border-color: var(--gold); }
  .channel .label { font-weight: bold; color: var(--gold); text-transform: uppercase; }
  .channel input[type="range"] { width: 100%; margin: 6px 0; }
  .fx-send { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
  .channel .meter { height: 60px; background: #111; border-radius: 4px; margin-top: 6px; overflow: hidden; }
  .meter-bar { height: 100%; width: 0%; background: linear-gradient(to top, #00ff00, #ffff00, #ff0000); transition: width 0.05s; }
  .master-section { background: #1a1a22; padding: 16px; border-radius: 20px; margin-top: 24px; }
  .btn-sm { padding: 4px 12px; font-size: 0.8rem; }
</style>
{% endblock %}
{% block content %}
<h2 style="color:var(--gold);">🎚️ Professional Mixer</h2>
<div class="mixer-container" id="mixerChannels"></div>
<div class="master-section">
  <div style="display: flex; gap: 30px; flex-wrap: wrap; align-items: center;">
    <div><strong>Master</strong></div>
    <label>Volume <input type="range" id="masterVol" min="0" max="1.2" step="0.01" value="0.9" style="width:120px;"></label>
    <label>Limiter <input type="range" id="limiterThresh" min="-30" max="0" step="0.5" value="-3" style="width:100px;"></label>
    <span id="masterMeter" style="background:#222; padding:4px 12px; border-radius:8px;">0.0 dB</span>
  </div>
  <div style="display:flex; gap:30px; flex-wrap:wrap; margin-top:12px;">
    <label>Reverb Send <input type="range" id="globalReverb" min="0" max="1" step="0.01" value="0.3"></label>
    <label>Delay Send <input type="range" id="globalDelay" min="0" max="1" step="0.01" value="0.15"></label>
  </div>
</div>
<div id="fxRack" style="margin-top:20px; display:flex; gap:20px; flex-wrap:wrap;"></div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/mixer.js') }}" defer></script>
{% endblock %}
