{% extends "base.html" %}
{% block content %}
<h2>Harmonizer — Advanced FX</h2>
<p class="brand-sub">Apply reverb, delay and frequency sculpting to sacred chords.</p>

<section style="display:flex;gap:12px;">
   <div style="flex:1;background:var(--glass);padding:12px;border-radius:8px;">
      <label>Reverb</label>
      <input id="fxReverb" type="range" min="0" max="1" step="0.01" value="0.3" />
      <label>Delay (ms)</label>
      <input id="fxDelay" type="range" min="0" max="1000" step="10" value="120" />
      <label>Mix</label>
      <input id="fxMix" type="range" min="0" max="1" step="0.01" value="0.4" />
      <div style="margin-top:12px">
         <button class="btn gold" onclick="applyFx()">Apply FX</button>
      </div>
   </div>
   
   <div style="width:340px;background:var(--glass);padding:12px;border-radius:8px;">
      <h4 style="color:var(--gold)">Preview</h4>
      <div id="fxPreview" style="height:160px;background:rgba(255,255,255,0.02);border-radius:8px;padding:8px">Use the Studio to preview with current FX settings.</div>
   </div>
</section>

<script>
   function applyFx() {
      const reverb = parseFloat(document.getElementById('fxReverb').value);
      const delay = parseInt(document.getElementById('fxDelay').value);
      const mix = parseFloat(document.getElementById('fxMix').value);
      // pass to AudioEngine if available
      if (window.rackEngine && window.rackEngine.applyFx) {
         window.rackEngine.applyFx({ reverb, delay, mix });
         alert('FX applied to global audio engine');
      } else {
         alert('Audio engine not loaded in this page — open Studio to preview FX.');
      }
   }
</script>
{% endblock %}
